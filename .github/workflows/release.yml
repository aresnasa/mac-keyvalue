name: Build & Release

on:
  push:
    tags:
      - 'v*'       # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3)'
        required: false

permissions:
  contents: write  # Needed for creating releases

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14  # Apple Silicon runner
    strategy:
      matrix:
        include:
          - arch: arm64
            arch_name: apple-silicon
          # Uncomment for Intel builds:
          # - arch: x86_64
          #   arch_name: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'

      - name: Detect version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate icons
        working-directory: MacKeyValue
        run: swift ../scripts/generate_icon.swift

      - name: Build & Package DMG
        working-directory: MacKeyValue
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x build.sh
          ./build.sh --ci --dmg

      - name: Upload DMG artefact
        uses: actions/upload-artifact@v4
        with:
          name: KeyValue-${{ steps.version.outputs.version }}-${{ matrix.arch_name }}
          path: MacKeyValue/dist/*.dmg

      - name: Upload checksum artefact
        uses: actions/upload-artifact@v4
        with:
          name: KeyValue-${{ steps.version.outputs.version }}-${{ matrix.arch_name }}-sha256
          path: MacKeyValue/dist/*.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: List artefacts
        run: find artefacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KeyValue ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
          files: |
            artefacts/**/*.dmg
            artefacts/**/*.sha256
          body: |
            ## KeyValue ${{ github.ref_name }}

            ### 📦 安装方法

            1. 下载下方的 `.dmg` 文件（根据你的 Mac 芯片选择）
            2. 打开 DMG，将 **KeyValue.app** 拖入 **Applications** 文件夹
            3. 首次打开：右键点击 KeyValue.app → 选择「打开」

            > ⚠️ 本应用是免费开源软件，未经 Apple 付费签名。
            > macOS 会在首次打开时提示"无法验证开发者"，
            > 右键 → 打开即可解除限制。

            ### 🔐 权限

            首次启动后，应用会引导你授予两个系统权限：
            - **辅助功能** — 用于模拟键盘输入密码
            - **输入监控** — 用于创建键盘事件

            ### ☕ 支持

            如果这个工具对你有帮助，欢迎：
            - 在 GitHub 上 ⭐ Star
            - 请作者喝杯咖啡（应用内 关于 → ☕ 请喝咖啡）

            ---
            **SHA256 校验和** 见随附的 `.sha256` 文件。
