name: Build & Release

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3)"
        required: false

permissions:
  contents: write # Needed for creating releases

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14 # Apple Silicon runner
    strategy:
      matrix:
        include:
          - arch: arm64
            arch_name: apple-silicon
          # Uncomment for Intel builds:
          # - arch: x86_64
          #   arch_name: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for version detection

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Detect version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate icons
        working-directory: MacKeyValue
        run: swift ../scripts/generate_icon.swift

      - name: Build & Package DMG
        working-directory: MacKeyValue
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x build.sh
          ./build.sh --ci --dmg

      - name: Compute SHA256
        id: sha
        working-directory: MacKeyValue/dist
        run: |
          DMG_FILE="$(ls *.dmg | head -1)"
          SHA256="$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "dmg_file=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
          echo "DMG: $DMG_FILE"

      - name: Upload DMG artefact
        uses: actions/upload-artifact@v4
        with:
          name: KeyValue-${{ steps.version.outputs.version }}-${{ matrix.arch_name }}
          path: MacKeyValue/dist/*.dmg

      - name: Upload checksum artefact
        uses: actions/upload-artifact@v4
        with:
          name: KeyValue-${{ steps.version.outputs.version }}-${{ matrix.arch_name }}-sha256
          path: MacKeyValue/dist/*.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      dmg_file: ${{ steps.sha.outputs.dmg_file }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: List artefacts
        run: find artefacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KeyValue ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artefacts/**/*.dmg
            artefacts/**/*.sha256
          body: |
            ## KeyValue ${{ github.ref_name }}

            ### 📦 安装方法

            #### 方式一：下载 DMG（推荐）

            1. 下载下方的 `.dmg` 文件（根据你的 Mac 芯片选择）
            2. 打开 DMG，将 **KeyValue.app** 拖入 **Applications** 文件夹
            3. 首次解除 Gatekeeper 限制（选其一）：

            **方法 A — 终端直接运行（所有版本通用，最可靠）：**
            > 打开终端，执行：
            > `/Applications/KeyValue.app/Contents/MacOS/MacKeyValue &`
            > 直接执行二进制完全绕过 Launch Services / Gatekeeper，无需管理员权限。

            **方法 B — 系统设置（适用于 macOS Ventura 13 ~ Sequoia 15）：**
            > 双击打开，弹窗点「完成」，然后：
            > 系统设置 → 隐私与安全性 → 找到「已阻止使用 KeyValue」→ 点击「仍要打开」

            **方法 C — 右键打开（适用于 macOS Ventura 及更早版本）：**
            > 右键点击 KeyValue.app → 选择「打开」→ 弹窗点「打开」

            > ⚠️ 本应用采用 ad-hoc 签名（无 Apple Developer ID）。
            > macOS 14+ 通过 `open` 或双击启动时 Gatekeeper 严格拦截（报 Launchd job spawn failed）；
            > `sudo spctl --add` 已在 macOS 26 (Tahoe) 中被彻底移除。
            > **推荐使用方法 A（终端直接运行）。**

            #### 方式二：Homebrew

            ```bash
            brew tap aresnasa/tap
            brew install --cask keyvalue
            ```

            ### 🔐 权限

            首次启动后，应用会引导你授予两个系统权限：
            - **辅助功能** (Accessibility) — 用于模拟键盘输入密码
            - **输入监控** (Input Monitoring) — 用于创建键盘事件

            ### ☕ 支持

            如果这个工具对你有帮助，欢迎：
            - 在 GitHub 上 ⭐ Star
            - 请作者喝杯咖啡（应用内 关于 → ☕ 请喝咖啡）

            ---
            **SHA256:** `${{ needs.build.outputs.sha256 }}`

  update-homebrew:
    name: Update Homebrew Tap
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-rc') && !contains(github.ref, '-alpha')

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: aresnasa/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          mkdir -p homebrew-tap/Casks

          cat > homebrew-tap/Casks/keyvalue.rb << CASKEOF
          cask "keyvalue" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/aresnasa/mac-keyvalue/releases/download/v#{version}/KeyValue-#{version}-apple-silicon.dmg"
            name "KeyValue"
            desc "K🔒V — Secure password & key-value manager for macOS"
            homepage "https://github.com/aresnasa/mac-keyvalue"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :ventura"

            app "KeyValue.app"

            postflight do
              # Step 1: Remove quarantine & provenance xattrs
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/KeyValue.app"],
                             sudo: false
              # Step 2: On macOS 13-15, attempt to add to Gatekeeper allowlist.
              # Note: spctl --add was removed in macOS 26 (Tahoe); this call is
              # best-effort and silently ignored on unsupported versions.
              system_command "/bin/sh",
                             args: ["-c", "spctl --add '#{appdir}/KeyValue.app' 2>/dev/null || true"],
                             sudo: true
            end

            zap trash: [
              "~/Library/Application Support/com.aresnasa.mackeyvalue",
              "~/Library/Preferences/com.aresnasa.mackeyvalue.plist",
              "~/Library/Caches/com.aresnasa.mackeyvalue",
            ]

            caveats <<~EOS
              KeyValue requires two system permissions for keyboard simulation:

                1. Accessibility: System Settings → Privacy & Security → Accessibility
                2. Input Monitoring: System Settings → Privacy & Security → Input Monitoring

              The app will guide you through the setup on first launch.

              Since this is an ad-hoc signed open-source app, if macOS blocks it,
              launch directly from Terminal (bypasses Gatekeeper on all versions):
                /Applications/KeyValue.app/Contents/MacOS/MacKeyValue &

              On macOS Ventura 13 ~ Sequoia 15 you can also go to:
                System Settings → Privacy & Security → Open Anyway
            EOS
          end
          CASKEOF

          # Remove leading whitespace (heredoc indentation)
          sed -i 's/^          //' homebrew-tap/Casks/keyvalue.rb

          echo "✅ Formula updated to v${VERSION}"
          cat homebrew-tap/Casks/keyvalue.rb

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to Homebrew formula (already up to date)"
          else
            git commit -m "Update keyvalue to ${VERSION}

          SHA256: ${SHA256}
          Release: https://github.com/aresnasa/mac-keyvalue/releases/tag/v${VERSION}
          Updated by: GitHub Actions"

            git push origin main
            echo "✅ Homebrew tap updated to v${VERSION}"
          fi
